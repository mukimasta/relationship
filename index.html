<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>关系工具书</title>
  </head>
  <body>
    <div id="app">
      <div class="main-ambient" aria-hidden="true"></div>
      <div id="stardust" class="stardust-layer" aria-hidden="true"></div>

      <div id="viewport">
        <div id="stage">
          <svg
            id="circles-svg"
            viewBox="-6 -6 112 112"
            preserveAspectRatio="xMidYMid meet"
            aria-hidden="true"
          >
            <g id="ring-lines"></g>
            <g id="ring-labels" aria-hidden="true"></g>
            <g id="dots-root"></g>
          </svg>
        </div>
      </div>

      <p id="empty-hint" class="empty-hint">
        <span class="empty-hint-line">想一个人，开始</span>
      </p>

      <footer class="main-dock">
        <button type="button" id="btn-clear" class="btn-chrome">清空</button>
        <button type="button" id="fab-add" class="fab" aria-label="添加一个人">+</button>
        <button type="button" id="btn-flow" class="btn-chrome">关系流转</button>
      </footer>

      <div id="sheet-backdrop" class="sheet-backdrop" hidden></div>
      <aside id="person-sheet" class="person-sheet" hidden>
        <div class="sheet-handle"></div>
        <h2 id="sheet-alias" class="sheet-alias"></h2>
        <p id="sheet-word" class="sheet-word"></p>
        <p id="sheet-time" class="sheet-time"></p>
        <div class="sheet-actions">
          <button type="button" id="sheet-retest" class="sheet-btn">重新感受</button>
          <button type="button" id="sheet-history" class="sheet-btn sheet-btn-ghost">查看记录</button>
        </div>
      </aside>

      <div id="history-backdrop" class="sheet-backdrop" hidden></div>
      <section id="history-panel" class="history-panel" hidden>
        <header class="history-header">
          <h2 id="history-title"></h2>
          <button type="button" id="history-close" class="history-close" aria-label="关闭">×</button>
        </header>
        <div id="history-list" class="history-list"></div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
