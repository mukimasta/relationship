<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>关系工具书</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: #1e1e1e;
    color: #fff;
    font-family: 'Noto Sans SC', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .page {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 40px 24px;
    opacity: 0;
    transition: opacity 0.4s ease;
    position: absolute;
    top: 0; left: 0;
  }

  .page.active {
    display: flex;
    opacity: 1;
  }

  .page.fading {
    opacity: 0;
  }

  /* ============ PAGE 1: WELCOME ============ */
  .welcome-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 6px;
    margin-bottom: 16px;
  }

  .welcome-sub {
    font-size: 15px;
    color: #999;
    letter-spacing: 2px;
    margin-bottom: 48px;
    text-align: center;
    line-height: 1.8;
  }

  .btn {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 14px 48px;
    font-size: 16px;
    font-family: 'Noto Sans SC', sans-serif;
    letter-spacing: 4px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn:hover { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); }

  .btn:active { background: rgba(255,255,255,0.1); }

  .btn.disabled {
    opacity: 0.25;
    pointer-events: none;
  }

  /* ============ PAGE 2: ALIAS ============ */
  .alias-prompt {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 32px;
    text-align: center;
    line-height: 1.6;
  }

  .alias-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 24px;
    font-family: 'Noto Serif SC', serif;
    text-align: center;
    padding: 12px 0;
    width: 240px;
    outline: none;
    letter-spacing: 2px;
    margin-bottom: 48px;
    transition: border-color 0.3s;
  }

  .alias-input::placeholder { color: rgba(255,255,255,0.2); }
  .alias-input:focus { border-color: rgba(255,255,255,0.6); }

  .skip-link {
    color: #666;
    font-size: 13px;
    cursor: pointer;
    margin-top: 16px;
    letter-spacing: 1px;
  }

  .skip-link:hover { color: #999; }

  /* ============ PAGE 3 & 4: SLIDERS ============ */
  /* .page 默认 left:0；加 max-width 后若不处理会整块贴左，宽屏不居中 */
  .slider-page {
    max-width: 480px;
    width: 100%;
    left: 50%;
    right: auto;
    transform: translateX(-50%);
  }

  .slider-question {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 60px;
  }

  .slider-question .alias-name {
    color: #f5c842;
  }

  /* Horizontal slider */
  .h-slider-wrap {
    position: relative;
    width: 100%;
    height: 56px;
    margin-bottom: 48px;
  }

  .h-slider-track {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.15);
    transform: translateY(-50%);
  }

  .h-slider-fill-left {
    position: absolute;
    top: 50%;
    left: 0;
    height: 2px;
    background: #c0392b;
    transform: translateY(-50%);
    transition: width 0.05s;
  }

  .h-slider-fill-right {
    position: absolute;
    top: 50%;
    right: 0;
    height: 2px;
    background: #4a9a4a;
    transform: translateY(-50%);
    transition: width 0.05s;
  }

  .slider-thumb {
    position: absolute;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
    cursor: grab;
    transition: box-shadow 0.2s;
    z-index: 10;
  }

  .slider-thumb:active { cursor: grabbing; box-shadow: 0 0 30px rgba(255,255,255,0.5); }

  .h-slider-thumb {
    top: 50%;
    transform: translate(-50%, -50%);
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }

  .slider-label {
    font-size: 15px;
    color: #888;
    letter-spacing: 2px;
  }

  /* Vertical slider */
  .v-slider-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 48px;
    height: 300px;
  }

  .v-slider-wrap {
    position: relative;
    width: 56px;
    height: 100%;
  }

  .v-slider-track {
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 2px;
    background: rgba(255,255,255,0.15);
    transform: translateX(-50%);
  }

  .v-slider-fill-top {
    position: absolute;
    left: 50%;
    top: 0;
    width: 2px;
    background: #e67e22;
    transform: translateX(-50%);
    transition: height 0.05s;
  }

  .v-slider-fill-bottom {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 2px;
    background: rgba(255,255,255,0.3);
    transform: translateX(-50%);
    transition: height 0.05s;
  }

  .v-slider-thumb {
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .v-labels {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    padding: 0;
  }

  .v-label {
    font-size: 14px;
    color: #888;
    letter-spacing: 2px;
    writing-mode: vertical-rl;
    text-orientation: upright;
  }

  .slider-btn-wrap {
    display: flex;
    justify-content: center;
  }

  /* ============ PAGE 5: RESULT ============ */
  /* 勿写 #page-result { display:flex }：ID 会压过 .page{display:none}，未激活时仍占位挡全屏点击 */
  #page-result {
    padding: 20px 12px;
    overflow-y: auto;
    box-sizing: border-box;
  }

  #page-result.active {
    flex-direction: column;
    align-items: center;
  }

  .result-alias {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: #f5c842;
    margin-bottom: 8px;
    letter-spacing: 2px;
    text-align: center;
    width: min(100%, 640px);
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }

  .result-prompt {
    font-size: 14px;
    color: #999;
    margin-bottom: 16px;
    letter-spacing: 1px;
    text-align: center;
    width: min(100%, 640px);
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }

  .grid-container {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4px;
    width: 100%;
    aspect-ratio: 1;
  }

  .quadrant-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 3px;
    padding: 3px;
  }

  .word-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4px 2px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: 0.5px;
    opacity: 0.2;
    transition: all 0.4s ease;
    cursor: default;
  }

  .word-cell.nearby {
    opacity: 1;
    cursor: pointer;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  .word-cell.nearby:hover {
    transform: scale(1.15);
    z-index: 20;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 8px rgba(255,255,255,0.1); }
    50% { box-shadow: 0 0 16px rgba(255,255,255,0.25); }
  }

  /* Quadrant colors */
  .q-tl .word-cell { color: #fff; }
  .q-tl .r0 { background: #b5312a; }
  .q-tl .r1 { background: #cc4040; }
  .q-tl .r2 { background: #d96b6b; }
  .q-tl .r3 { background: #e8a0a0; color: #4a1a1a; }

  .q-tr .word-cell { color: #3a1a00; }
  .q-tr .r0 { background: #d97519; color: #fff; }
  .q-tr .r1 { background: #e89540; }
  .q-tr .r2 { background: #f0b570; }
  .q-tr .r3 { background: #f8d8a8; }

  .q-bl .word-cell { color: #dde8f0; }
  .q-bl .r0 { background: #7095b5; }
  .q-bl .r1 { background: #5578a0; }
  .q-bl .r2 { background: #3a5d85; }
  .q-bl .r3 { background: #1e3a5f; }

  .q-br .word-cell { color: #1a3a1a; }
  .q-br .r0 { background: #9dd09d; }
  .q-br .r1 { background: #72b872; }
  .q-br .r2 { background: #4da04d; }
  .q-br .r3 { background: #358835; color: #e0f0e0; }

  /* User dot：必须占满整格 grid，否则 abspos 的 % 会相对「单个象限」算，点和坐标对不上 */
  .user-dot {
    grid-column: 1 / -1;
    grid-row: 1 / -1;
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #f5c842;
    border: 2px solid #fff;
    box-shadow: 0 0 24px rgba(245, 200, 66, 0.6);
    z-index: 30;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: dot-pulse 1.5s ease-in-out infinite;
  }

  @keyframes dot-pulse {
    0%, 100% { box-shadow: 0 0 16px rgba(245,200,66,0.5); }
    50% { box-shadow: 0 0 32px rgba(245,200,66,0.8); }
  }

  /* Axis labels：相对 .grid-wrapper 定位，故 wrapper 必须与色块同宽，否则 left:50% 对的是整屏中线 */
  .grid-wrapper {
    position: relative;
    width: min(100%, 640px);
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
    box-sizing: border-box;
  }

  .grid-axis-label {
    position: absolute;
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
    font-weight: 500;
  }

  .grid-axis-top {
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
  }

  .grid-axis-bottom {
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
  }

  .grid-axis-left {
    left: -24px;
    top: 50%;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    text-orientation: upright;
  }

  .grid-axis-right {
    right: -24px;
    top: 50%;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    text-orientation: upright;
  }

  /* ============ PAGE 6: FINAL ============ */
  .final-word {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 8px;
    margin-bottom: 12px;
    text-align: center;
  }

  .final-alias {
    font-size: 16px;
    color: #999;
    margin-bottom: 48px;
    letter-spacing: 2px;
  }

  .final-word.color-tl { color: #e85050; }
  .final-word.color-tr { color: #f0a030; }
  .final-word.color-bl { color: #6090c0; }
  .final-word.color-br { color: #5ab85a; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 480px) {
    .welcome-title { font-size: 32px; }
    .slider-question { font-size: 18px; margin-bottom: 40px; }
    .word-cell { font-size: 9.5px; letter-spacing: 0; }
    .grid-container { gap: 3px; }
    .quadrant-grid { gap: 2px; padding: 2px; }
    .final-word { font-size: 36px; }
    .alias-input { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- PAGE 1: WELCOME -->
<div class="page active" id="page-welcome">
  <div class="welcome-title">关系工具书</div>
  <div class="welcome-sub">两个问题，十秒定位<br>帮你给说不清的关系感受命名</div>
  <button class="btn" onclick="goTo('page-alias')">开始</button>
</div>

<!-- PAGE 2: ALIAS -->
<div class="page" id="page-alias">
  <div class="alias-prompt">想一个人<br>给 ta 起个代号</div>
  <input class="alias-input" id="alias-input" type="text" placeholder="代号" maxlength="10" autocomplete="off">
  <button class="btn" onclick="submitAlias()">下一步</button>
  <div class="skip-link" onclick="submitAlias(true)">跳过，不起名</div>
</div>

<!-- PAGE 3: HORIZONTAL SLIDER -->
<div class="page slider-page" id="page-slider-h">
  <div class="slider-question">想到 <span class="alias-name" id="q1-alias">ta</span><br>你的身体是紧的，还是松的？</div>
  <div class="h-slider-wrap" id="h-slider">
    <div class="h-slider-track"></div>
    <div class="h-slider-fill-left" id="h-fill-left"></div>
    <div class="h-slider-fill-right" id="h-fill-right"></div>
    <div class="slider-thumb h-slider-thumb" id="h-thumb"></div>
  </div>
  <div class="slider-labels">
    <span class="slider-label">紧</span>
    <span class="slider-label">松</span>
  </div>
  <div style="height:40px"></div>
  <div class="slider-btn-wrap">
    <button class="btn disabled" id="btn-h-next" onclick="goTo('page-slider-v')">下一步</button>
  </div>
</div>

<!-- PAGE 4: VERTICAL SLIDER -->
<div class="page slider-page" id="page-slider-v">
  <div class="slider-question"><span class="alias-name" id="q2-alias">ta</span> 在你脑子里<br>占多大一块地方？</div>
  <div class="v-slider-container">
    <div class="v-labels">
      <span class="v-label">时刻都在</span>
      <span class="v-label">偶尔浮现</span>
    </div>
    <div class="v-slider-wrap" id="v-slider">
      <div class="v-slider-track"></div>
      <div class="v-slider-fill-top" id="v-fill-top"></div>
      <div class="v-slider-fill-bottom" id="v-fill-bottom"></div>
      <div class="slider-thumb v-slider-thumb" id="v-thumb"></div>
    </div>
  </div>
  <div class="slider-btn-wrap">
    <button class="btn disabled" id="btn-v-next" onclick="showResult()">看结果</button>
  </div>
</div>

<!-- PAGE 5: RESULT GRID -->
<div class="page" id="page-result">
  <div class="result-alias" id="result-alias"></div>
  <div class="result-prompt">哪个词最准？点它。</div>
  <div class="grid-wrapper">
    <div class="grid-axis-label grid-axis-top">高投入</div>
    <div class="grid-axis-label grid-axis-bottom">低投入</div>
    <div class="grid-axis-label grid-axis-left">消耗</div>
    <div class="grid-axis-label grid-axis-right">滋养</div>
    <div class="grid-container" id="grid-container">
      <div class="quadrant-grid q-tl" id="grid-tl"></div>
      <div class="quadrant-grid q-tr" id="grid-tr"></div>
      <div class="quadrant-grid q-bl" id="grid-bl"></div>
      <div class="quadrant-grid q-br" id="grid-br"></div>
      <div class="user-dot" id="user-dot"></div>
    </div>
  </div>
</div>

<!-- PAGE 6: FINAL -->
<div class="page" id="page-final">
  <div class="final-alias" id="final-alias"></div>
  <div class="final-word" id="final-word"></div>
  <div style="height: 48px"></div>
  <button class="btn" onclick="location.reload()">再测一次</button>
</div>

<script>
// ===== DATA =====
const wordsData = {
  tl: [
    ['窒息','情绪绑架','控制','纠缠','疯狂拉扯'],
    ['讨好','过度依赖','患得患失','争夺','反复试探'],
    ['委屈','压抑','紧绷','焦虑','内耗'],
    ['隐忍','小心翼翼','不对等','勉强','不踏实'],
  ],
  tr: [
    ['全情投入','并肩作战','灵魂共振','热恋','知己'],
    ['默契','坦诚相待','深度信任','彼此激发','惺惺相惜'],
    ['看见','亲近','被支持','安全感','归属感'],
    ['好感','欣赏','信任','温暖','踏实'],
  ],
  bl: [
    ['无所谓','敷衍','将就','例行公事','不想经营'],
    ['无力','心累','回避','冷淡','疏离'],
    ['形同陌路','冷暴力','名存实亡','失望透顶','心寒'],
    ['废墟','彻底放弃','耗竭','死心','麻木'],
  ],
  br: [
    ['有底气','放心','淡然','自在','安心'],
    ['松弛','淡而不疏','君子之交','细水长流','各自安好'],
    ['静好','相忘江湖','偶尔想起','老友如故','不联系也安心'],
    ['无需维系','祝福','释然','各自精彩','遥远的温暖'],
  ]
};

// Compute coordinates for each word
// x: -1 (消耗) to +1 (滋养), y: -1 (低投入) to +1 (高投入)
const allWords = [];

function addWords(qKey, xSign, ySign) {
  const rows = wordsData[qKey];
  rows.forEach((row, ri) => {
    row.forEach((text, ci) => {
      // Within quadrant: row 0 = furthest from center, row 3 = closest
      // Column 0-4 maps across the quadrant
      const yMag = ySign > 0
        ? 0.125 + (3 - ri) * 0.25  // top quadrants: row0=0.875, row3=0.125
        : 0.125 + ri * 0.25;        // bottom quadrants: row0=0.125, row3=0.875
      // 列 ci=0 在 DOM 里是象限内「靠左」一列。左半区 (tl/bl) 左=更消耗=更负的 x；
      // 右半区 (tr/br) ci=0 是靠近中线一列=较小正 x。原先用同一式导致左半区 x 与屏幕左右相反。
      const xMag =
        xSign < 0 ? 0.9 - ci * 0.2 : 0.1 + ci * 0.2;

      allWords.push({
        text,
        x: xSign * xMag,
        y: ySign * yMag,
        q: qKey,
        ri,
        ci
      });
    });
  });
}

addWords('tl', -1, 1);
addWords('tr', 1, 1);
addWords('bl', -1, -1);
addWords('br', 1, -1);

// ===== STATE =====
let alias = '';
let valX = 0; // -1 to 1
let valY = 0; // -1 to 1
let hTouched = false;
let vTouched = false;

// ===== NAVIGATION =====
function goTo(pageId) {
  const current = document.querySelector('.page.active');
  if (current) {
    current.classList.add('fading');
    setTimeout(() => {
      current.classList.remove('active', 'fading');
      const next = document.getElementById(pageId);
      next.classList.add('active');
      requestAnimationFrame(() => next.classList.remove('fading'));
    }, 300);
  }
}

function submitAlias(skip) {
  alias = skip ? '' : document.getElementById('alias-input').value.trim();
  const display = alias || 'ta';
  document.getElementById('q1-alias').textContent = display;
  document.getElementById('q2-alias').textContent = display;
  goTo('page-slider-h');
}

// ===== HORIZONTAL SLIDER =====
(function() {
  const wrap = document.getElementById('h-slider');
  const thumb = document.getElementById('h-thumb');
  const fillL = document.getElementById('h-fill-left');
  const fillR = document.getElementById('h-fill-right');
  const btn = document.getElementById('btn-h-next');
  let dragging = false;

  function setVal(ratio) {
    ratio = Math.max(0, Math.min(1, ratio));
    valX = ratio * 2 - 1; // -1 to 1
    const pct = ratio * 100;
    thumb.style.left = pct + '%';
    fillL.style.width = Math.max(0, 50 - pct) * 2 + '%';
    fillR.style.width = Math.max(0, pct - 50) * 2 + '%';
    fillR.style.right = '0';
    fillL.style.left = '0';
    // Recalc fills
    if (ratio < 0.5) {
      fillL.style.left = pct + '%';
      fillL.style.width = (50 - pct) + '%';
      fillR.style.width = '0';
    } else {
      fillR.style.right = (100 - pct) + '%';
      fillR.style.width = (pct - 50) + '%';
      fillL.style.width = '0';
    }
  }

  // Init center
  setVal(0.5);

  function onStart(e) {
    dragging = true;
    hTouched = true;
    btn.classList.remove('disabled');
    onMove(e);
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const ratio = (clientX - rect.left) / rect.width;
    setVal(ratio);
  }

  function onEnd() { dragging = false; }

  wrap.addEventListener('mousedown', onStart);
  wrap.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
})();

// ===== VERTICAL SLIDER =====
(function() {
  const wrap = document.getElementById('v-slider');
  const thumb = document.getElementById('v-thumb');
  const fillT = document.getElementById('v-fill-top');
  const fillB = document.getElementById('v-fill-bottom');
  const btn = document.getElementById('btn-v-next');
  let dragging = false;

  function setVal(ratio) {
    // ratio: 0 = top (高投入), 1 = bottom (低投入)
    ratio = Math.max(0, Math.min(1, ratio));
    valY = (1 - ratio) * 2 - 1; // -1 (bottom) to 1 (top)
    const pct = ratio * 100;
    thumb.style.top = pct + '%';
    if (ratio < 0.5) {
      fillT.style.height = pct + '%';
      fillT.style.top = '0';
      fillB.style.height = '0';
    } else {
      fillB.style.height = (100 - pct) + '%';
      fillB.style.bottom = '0';
      fillT.style.height = '0';
    }
  }

  setVal(0.5);

  function onStart(e) {
    dragging = true;
    vTouched = true;
    btn.classList.remove('disabled');
    onMove(e);
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const ratio = (clientY - rect.top) / rect.height;
    setVal(ratio);
  }

  function onEnd() { dragging = false; }

  wrap.addEventListener('mousedown', onStart);
  wrap.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
})();

// ===== RESULT =====
function showResult() {
  // Build grid
  buildGrid();

  // Set alias display
  const aliasEl = document.getElementById('result-alias');
  aliasEl.textContent = alias ? `关于「${alias}」` : '';

  // Position user dot
  // Map valX (-1..1) to percentage in grid (0..100)
  // x: -1 = left edge, +1 = right edge
  const dotX = (valX + 1) / 2 * 100;
  // y: +1 = top, -1 = bottom → invert for CSS
  const dotY = (1 - valY) / 2 * 100;
  const dot = document.getElementById('user-dot');
  dot.style.left = dotX + '%';
  dot.style.top = dotY + '%';

  // Find nearest 8 words
  const distances = allWords.map((w, i) => ({
    i,
    d: Math.sqrt((w.x - valX) ** 2 + (w.y - valY) ** 2)
  }));
  distances.sort((a, b) => a.d - b.d);
  const nearbyIndices = new Set(distances.slice(0, 8).map(d => d.i));

  // Apply highlights
  document.querySelectorAll('.word-cell').forEach((el, i) => {
    if (nearbyIndices.has(i)) {
      el.classList.add('nearby');
      el.onclick = () => selectWord(allWords[i]);
    }
  });

  goTo('page-result');
}

function buildGrid() {
  const grids = { tl: 'grid-tl', tr: 'grid-tr', bl: 'grid-bl', br: 'grid-br' };
  let globalIndex = 0;

  for (const [qKey, gridId] of Object.entries(grids)) {
    const container = document.getElementById(gridId);
    container.innerHTML = '';
    const rows = wordsData[qKey];
    rows.forEach((row, ri) => {
      row.forEach((text) => {
        const cell = document.createElement('div');
        cell.className = `word-cell r${ri}`;
        cell.textContent = text;
        cell.dataset.index = globalIndex;
        container.appendChild(cell);
        globalIndex++;
      });
    });
  }
}

function selectWord(word) {
  const finalWord = document.getElementById('final-word');
  finalWord.textContent = word.text;
  finalWord.className = 'final-word';

  // Color based on quadrant
  const colorMap = { tl: 'color-tl', tr: 'color-tr', bl: 'color-bl', br: 'color-br' };
  finalWord.classList.add(colorMap[word.q]);

  const finalAlias = document.getElementById('final-alias');
  finalAlias.textContent = alias ? `你和「${alias}」的此刻` : '你的此刻';

  goTo('page-final');
}

// Enter key on alias input
document.getElementById('alias-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitAlias();
});
</script>
